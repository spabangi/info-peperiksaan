<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Portal 2026</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: #f1f5f9;
}

header {
  padding: 20px;
  text-align: center;
  background: #111827;
}

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  margin: 20px;
}

input, select, button {
  padding: 10px;
  border-radius: 8px;
  border: none;
}

input, select {
  background: #1e293b;
  color: white;
}

button {
  background: #2563eb;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

table {
  width: 95%;
  margin: auto;
  border-collapse: collapse;
  margin-bottom: 40px;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #334155;
  text-align: center;
}

th {
  background: #1e293b;
}

tr:hover {
  background: #1e293b;
}

.status {
  text-align:center;
  margin:15px;
  color:#facc15;
}

footer {
  text-align: center;
  padding: 20px;
  background: #111827;
  font-size: 0.9rem;
}

@media(max-width:768px){
  table { font-size: 0.8rem; }
}
</style>
</head>

<body>

<header>
<h1>SEKSYEN PERKHIDMATAN AKADEMIK KPTM BANGI</h1>
<h2>Exam Portal 2026</h2>
</header>

<div class="controls">
<input type="text" id="search" placeholder="Search Name / Student ID">
<select id="sort">
<option value="">Sort By</option>
<option value="name">Student Name</option>
<option value="id">Student ID</option>
<option value="date">Date</option>
</select>

<button onclick="window.open('GD link')">
Official Documents
</button>

<button onclick="window.open('csv link')">
⚙ Settings
</button>
</div>

<div class="status" id="status">Loading exam data...</div>

<table id="examTable">
<thead>
<tr>
<th>Name</th>
<th>ID</th>
<th>Course</th>
<th>Date</th>
<th>Time</th>
<th>Venue</th>
<th>Hall</th>
<th>Seat</th>
</tr>
</thead>
<tbody></tbody>
</table>

<footer>
SEKSYEN PERKHIDMATAN AKADEMIK KPTM BANGI<br><br>
Copyright © SSG 2026. All rights reserved.
</footer>

<script>

// 🔴 REPLACE THIS WITH YOUR PUBLISHED CSV LINK
const csvUrl = "csv link";

let data = [];

fetch(csvUrl)
.then(response => {
  if (!response.ok) throw new Error("CSV fetch failed");
  return response.text();
})
.then(text => {
  const rows = text.trim().split("\n").slice(1);
  data = rows.map(row => row.split(","));
  renderTable(data);
  document.getElementById("status").innerText = "Data Loaded Successfully";
})
.catch(error => {
  document.getElementById("status").innerText = "Error loading data. Check CSV publish settings.";
  console.error(error);
});

function renderTable(rows){
  const tbody = document.querySelector("#examTable tbody");
  tbody.innerHTML = "";
  rows.forEach(r=>{
    if(r.length>1){
      const tr = document.createElement("tr");
      r.forEach(c=>{
        const td = document.createElement("td");
        td.textContent = c;
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    }
  });
}

document.getElementById("search").addEventListener("input", e=>{
  const value = e.target.value.toLowerCase();
  const filtered = data.filter(r => r.join(" ").toLowerCase().includes(value));
  renderTable(filtered);
});

document.getElementById("sort").addEventListener("change", e=>{
  let sorted = [...data];

  if(e.target.value==="name")
    sorted.sort((a,b)=>a[0].localeCompare(b[0]));

  if(e.target.value==="id")
    sorted.sort((a,b)=>a[1].localeCompare(b[1]));

  if(e.target.value==="date")
    sorted.sort((a,b)=> new Date(a[3]) - new Date(b[3]));

  renderTable(sorted);
});

</script>

</body>
</html>
