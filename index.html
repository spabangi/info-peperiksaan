<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Portal 2026</title>

<style>
* { box-sizing: border-box; margin:0; padding:0; }

body{
  font-family: 'Segoe UI', sans-serif;
  background:#0f172a;
  color:#f1f5f9;
  overflow-x:hidden;
}

/* NAVIGATION */
nav{
  background:#111827;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:1000;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
}

.logo-area{
  display:flex;
  align-items:center;
  gap:15px;
}

.logo{
  width:40px;
  height:40px;
  background:#2563eb;
  border-radius:8px;
}

nav h1{
  font-size:1rem;
  font-weight:600;
}

.lang-toggle{
  cursor:pointer;
  font-size:0.9rem;
  opacity:0.8;
}

.container{
  padding:40px 20px;
  max-width:1100px;
  margin:auto;
}

/* SEARCH CARD */
.search-card{
  background:#1e293b;
  padding:30px;
  border-radius:16px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  animation:fadeIn 1s ease;
}

input{
  padding:12px;
  width:250px;
  border-radius:8px;
  border:none;
  background:#0f172a;
  color:white;
  margin-right:10px;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#1d4ed8;
  transform:translateY(-2px);
}

/* TABS */
.tabs{
  margin-top:40px;
  display:flex;
  gap:20px;
  border-bottom:1px solid #334155;
}

.tab{
  padding:10px;
  cursor:pointer;
  opacity:0.7;
}

.tab.active{
  border-bottom:2px solid #2563eb;
  opacity:1;
}

/* CARDS */
.cards{
  margin-top:30px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  animation:slideUp 0.6s ease;
}

.card h3{
  margin-bottom:10px;
}

.footer{
  text-align:center;
  padding:30px;
  background:#111827;
  margin-top:50px;
  font-size:0.9rem;
}

.history{
  margin-top:15px;
  font-size:0.8rem;
  opacity:0.7;
}

.history span{
  cursor:pointer;
  margin-right:10px;
}

.hidden{ display:none; }

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes slideUp{
  from{opacity:0; transform:translateY(40px);}
  to{opacity:1; transform:translateY(0);}
}

@media(max-width:768px){
  input{width:100%; margin-bottom:10px;}
}
</style>
</head>

<body>

<nav>
  <div class="logo-area">
    <div class="logo"></div>
    <h1>SEKSYEN PERKHIDMATAN AKADEMIK KPTM BANGI</h1>
  </div>
  <div class="lang-toggle" onclick="toggleLang()">EN | BM</div>
</nav>

<div class="container">

  <div class="search-card">
    <h2 id="portalTitle">Exam Portal 2026</h2>
    <br>
    <input type="text" id="studentInput" placeholder="Enter Student ID or Name">
    <button onclick="searchStudent()">Search</button>

    <div class="history" id="history"></div>
  </div>

  <div id="dashboard" class="hidden">
    <div class="tabs">
      <div class="tab active" onclick="showTab('timetable')">Timetable</div>
      <div class="tab" onclick="showTab('seating')">Seating</div>
      <div class="tab" onclick="showTab('documents')">Documents</div>
    </div>

    <div id="timetable" class="cards"></div>
    <div id="seating" class="cards hidden"></div>
    <div id="documents" class="cards hidden"></div>
  </div>

</div>

<div class="footer">
SEKSYEN PERKHIDMATAN AKADEMIK KPTM BANGI<br><br>
Copyright © SSG 2026. All rights reserved.
</div>

<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRTy6Guhhcg2p5IL_ZBTADjALjcvlIcJs_gIKhxmEhUqd7HZ2aoUfr0Y6KsKn_owG3R34MNWXp9qZo7/pub?gid=0&single=true&output=csv";
let allData = [];
let currentLang="EN";

fetch(csvUrl)
.then(res=>res.text())
.then(text=>{
  const rows = text.split("\n").slice(1);
  allData = rows.map(r=>r.split(","));
});

function searchStudent(){
  const value = document.getElementById("studentInput").value.toLowerCase();
  const results = allData.filter(r =>
    r[0].toLowerCase().includes(value) ||
    r[1].toLowerCase().includes(value)
  );

  if(results.length===0){
    alert("No record found");
    return;
  }

  localStorage.setItem("lastSearch", value);
  loadHistory();

  document.getElementById("dashboard").classList.remove("hidden");

  const timetable = document.getElementById("timetable");
  const seating = document.getElementById("seating");

  timetable.innerHTML="";
  seating.innerHTML="";

  results.forEach(r=>{
    timetable.innerHTML += `
      <div class="card">
        <h3>${r[3]}</h3>
        <p>Date: ${r[4]}</p>
        <p>Time: ${r[5]}</p>
        <p>Venue: ${r[6]}</p>
      </div>
    `;

    seating.innerHTML += `
      <div class="card">
        <h3>${r[3]}</h3>
        <p>Hall: ${r[7]}</p>
        <p>Seat: ${r[8]}</p>
        <button onclick="window.open('${r[9]}')">View Seating PDF</button>
      </div>
    `;
  });

  document.getElementById("documents").innerHTML=`
    <div class="card">
      <h3>Official Documents</h3>
      <button onclick="window.open('https://drive.google.com/drive/folders/13ZETLZ-W3mq98Js55DnawxJu8Undo575?usp=drive_link')">Open Folder</button>
    </div>
  `;
}

function showTab(tab){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  event.target.classList.add("active");

  document.getElementById("timetable").classList.add("hidden");
  document.getElementById("seating").classList.add("hidden");
  document.getElementById("documents").classList.add("hidden");

  document.getElementById(tab).classList.remove("hidden");
}

function loadHistory(){
  const last = localStorage.getItem("lastSearch");
  if(last){
    document.getElementById("history").innerHTML=
      "Last Search: <span onclick='reuseSearch()'>"+last+"</span>";
  }
}

function reuseSearch(){
  document.getElementById("studentInput").value =
  localStorage.getItem("lastSearch");
  searchStudent();
}

function toggleLang(){
  currentLang = currentLang==="EN"?"BM":"EN";
  alert(currentLang==="BM"?"Bahasa Melayu Aktif":"English Activated");
}

loadHistory();
</script>

</body>
</html>
