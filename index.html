<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Portal 2026</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: #f1f5f9;
  transition: 0.3s ease;
}

header {
  padding: 20px;
  text-align: center;
  background: #111827;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

h1 {
  margin: 0;
  font-size: 1.5rem;
}

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  margin: 20px;
}

input, select, button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
}

input, select {
  background: #1e293b;
  color: white;
}

button {
  background: #2563eb;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #1d4ed8;
}

table {
  width: 95%;
  margin: auto;
  border-collapse: collapse;
  margin-bottom: 40px;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #334155;
  text-align: center;
}

th {
  background: #1e293b;
  cursor: pointer;
}

tr:hover {
  background: #1e293b;
}

footer {
  text-align: center;
  padding: 20px;
  background: #111827;
  font-size: 0.9rem;
}

@media(max-width:768px){
  table { font-size: 0.8rem; }
}
</style>
</head>

<body>

<header>
<h1>SEKSYEN PERKHIDMATAN AKADEMIK KPTM BANGI</h1>
<h2>Exam Portal 2026</h2>
</header>

<div class="controls">
<input type="text" id="search" placeholder="Search Name / Student ID">
<select id="sort">
<option value="">Sort By</option>
<option value="name">Student Name</option>
<option value="id">Student ID</option>
<option value="date">Date</option>
</select>
<button onclick="toggleLanguage()">BM / ENG</button>
<button onclick="window.open('https://drive.google.com/drive/folders/1nRyiRxlpJQ9BqrwxCGpYeNdTa6pEWu09?usp=drive_link')">Official Documents</button>
<button onclick="window.open('https://docs.google.com/spreadsheets/d/1MymTLO2DSGL5SM7MqGkyzyoAe5dYXFIfxMFxbzTgUmY/edit?usp=sharing')">⚙ Settings</button>
</div>

<table id="examTable">
<thead>
<tr>
<th>Name</th>
<th>ID</th>
<th>Course</th>
<th>Date</th>
<th>Time</th>
<th>Venue</th>
<th>Hall</th>
<th>Seat</th>
</tr>
</thead>
<tbody></tbody>
</table>

<footer>
SEKSYEN PERKHIDMATAN AKADEMIK KPTM BANGI<br><br>
Copyright © SSG 2026. All rights reserved.
</footer>

<script>
const csvUrl = "PASTE_YOUR_CSV_LINK_HERE";
let data = [];
let currentLang = "EN";

fetch(csvUrl)
.then(res => res.text())
.then(text => {
  const rows = text.split("\n").slice(1);
  data = rows.map(row => row.split(","));
  renderTable(data);
});

function renderTable(rows){
  const tbody = document.querySelector("#examTable tbody");
  tbody.innerHTML = "";
  rows.forEach(r=>{
    if(r.length>1){
      const tr = document.createElement("tr");
      r.forEach(c=>{
        const td = document.createElement("td");
        td.textContent = c;
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    }
  });
}

document.getElementById("search").addEventListener("input", e=>{
  const value = e.target.value.toLowerCase();
  const filtered = data.filter(r => r.join(" ").toLowerCase().includes(value));
  renderTable(filtered);
});

document.getElementById("sort").addEventListener("change", e=>{
  let sorted = [...data];
  if(e.target.value==="name") sorted.sort((a,b)=>a[0].localeCompare(b[0]));
  if(e.target.value==="id") sorted.sort((a,b)=>a[1].localeCompare(b[1]));
  if(e.target.value==="date") sorted.sort((a,b)=>new Date(a[3]) - new Date(b[3]));
  renderTable(sorted);
});

function toggleLanguage(){
  currentLang = currentLang==="EN" ? "BM" : "EN";
  alert(currentLang==="BM" ? "Bahasa Melayu Aktif" : "English Activated");
}
</script>

</body>
</html>
