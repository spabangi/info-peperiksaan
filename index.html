<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Google AI Studio App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4CAF50, #2196F3);
      color: white;
      text-align: center;
      padding: 60px 20px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2rem;
      max-width: 600px;
      margin: 0 auto 30px;
    }

    .btn {
      background: white;
      color: #2196F3;
      padding: 12px 25px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #f1f1f1;
    }

    footer {
      margin-top: 60px;
      font-size: 0.9rem;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <h1>🚀 My Website is Live!</h1>

  <p>
    This website was generated using Google AI Studio and 
    published for free using GitHub Pages.
  </p>

  <a href="#" class="btn">Learn More</a>

  <footer>
    © 2026 My Website
  </footer>

</body>
</html>
