<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Portal 2026</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Segoe UI',sans-serif;
  background:#0f172a;
  color:#cbd5e1;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* NAV */
nav{
  background:#1e293b;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  border-bottom:1px solid #334155;
}
.logo-area{
  display:flex;
  align-items:center;
  gap:15px;
}
.logo-area img{
  height:55px;
}
.menu{
  display:flex;
  gap:30px;
}
.menu div{
  cursor:pointer;
  color:#94a3b8;
}
.menu div:hover{
  color:white;
}

/* CONTENT */
.section{
  display:none;
  max-width:1100px;
  margin:40px auto;
  padding:0 20px;
  animation:fade .5s ease;
}
.active-section{display:block}

/* CARD */
.card{
  background:#1e293b;
  border:1px solid #334155;
  border-radius:14px;
  padding:25px;
  margin-bottom:25px;
}

/* NOTICE BOARD */
.notice-board{
  min-height:140px;
  white-space:pre-line;
  font-size:1rem;
  line-height:1.7;
}

/* BUTTON */
button{
  padding:8px 14px;
  border:none;
  border-radius:6px;
  background:#475569;
  color:white;
  cursor:pointer;
}
button:hover{background:#64748b}

input,textarea{
  width:100%;
  background:#334155;
  border:none;
  padding:10px;
  color:white;
  border-radius:6px;
  margin-top:10px;
}

/* STUDENT CARDS */
.student-card{
  background:#334155;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
}

/* FOOTER FIXED */
footer{
  margin-top:auto;
  background:#1e293b;
  text-align:center;
  padding:25px;
  border-top:1px solid #334155;
  font-size:.9rem;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
</style>
</head>
<body>

<nav>
  <div class="logo-area">
    <img src="https://spabangi.github.io/logo/logo.png">
    <div>SEKSYEN PERKHIDMATAN AKADEMIK KPTM BANGI</div>
  </div>
  <div class="menu">
    <div onclick="showSection('home')">Home</div>
    <div onclick="showSection('student')">Student Portal</div>
    <div onclick="toggleLang()">EN | BM</div>
    <div onclick="adminLogin()">Admin</div>
  </div>
</nav>

<!-- HOME -->
<section id="home" class="section active-section">
  <h2 id="homeTitle">Exam Portal 2026</h2>

  <div class="card notice-board" id="noticeBoard">
    Loading notice...
  </div>

  <div class="card" id="adminNoticePanel" style="display:none">
    <h3>Edit Notice</h3>
    <textarea id="noticeInput" rows="4"></textarea>
    <button onclick="saveNotice()">Save Notice</button>
  </div>
</section>

<!-- STUDENT -->
<section id="student" class="section">
  <h2>Search Student</h2>
  <input id="studentInput" placeholder="Enter ID or Name">
  <button onclick="searchStudent()">Search</button>
  <div id="studentResults"></div>
</section>

<footer>
  <div id="footerMotivation"></div>
  <br>
  Copyright © SSG 2026. All rights reserved.
</footer>

<script>

const studentCSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vRTy6Guhhcg2p5IL_ZBTADjALjcvlIcJs_gIKhxmEhUqd7HZ2aoUfr0Y6KsKn_owG3R34MNWXp9qZo7/pub?gid=0&single=true&output=csv";
const settingsCSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vRTy6Guhhcg2p5IL_ZBTADjALjcvlIcJs_gIKhxmEhUqd7HZ2aoUfr0Y6KsKn_owG3R34MNWXp9qZo7/pub?gid=1632474227&single=true&output=csv";
const apiURL="https://script.google.com/macros/s/AKfycbxYk8yTNSvd5z9zQmvmZN37bKGDio1Pc3dhjT_9_sObdW8oAcHZ9rVKickXEV1wp3ERRg/exec";

let noticeText="";
let studentData=[];
let currentLang="EN";

const lang={
EN:{
 homeTitle:"Exam Portal 2026",
 footer:"Best of luck!\nMay all your efforts so far bear success.\nKeep striving and never give up!"
},
BM:{
 homeTitle:"Portal Peperiksaan 2026",
 footer:"Selamat maju jaya!\nSemoga segala usaha anda selama ini membuahkan kejayaan.\nTeruskan berusaha dan jangan putus asa!"
}
};

fetch(settingsCSV)
.then(r=>r.text())
.then(t=>{
 let rows=t.split("\n").slice(1);
 rows.forEach(r=>{
   let c=r.split(",");
   if(c[0]=="Notice") noticeText=c[1];
 });
 document.getElementById("noticeBoard").innerText=noticeText;
});

fetch(studentCSV)
.then(r=>r.text())
.then(t=>{
 studentData=t.split("\n").slice(1).map(r=>r.split(","));
});

function showSection(id){
 document.querySelectorAll(".section").forEach(s=>s.classList.remove("active-section"));
 document.getElementById(id).classList.add("active-section");
}

function searchStudent(){
 let q=document.getElementById("studentInput").value.toLowerCase();
 let res=studentData.filter(r=>r[0].toLowerCase().includes(q)||r[1].toLowerCase().includes(q));
 let out="";
 res.forEach(r=>{
   out+=`<div class="student-card">
     <strong>${r[3]}</strong><br>
     Date: ${r[4]}<br>
     Time: ${r[5]}<br>
     Venue: ${r[6]}<br>
     Seat: ${r[7]}
   </div>`;
 });
 document.getElementById("studentResults").innerHTML=out||"No record found";
}

function adminLogin(){
 let p=prompt("Enter Admin Password:");
 if(p==="AdminPassword"){
   document.getElementById("adminNoticePanel").style.display="block";
 }
}

function saveNotice(){
 let newNotice=document.getElementById("noticeInput").value;
 fetch(apiURL,{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({Notice:newNotice})
 })
 .then(res=>res.json())
 .then(()=>{
   noticeText=newNotice;
   document.getElementById("noticeBoard").innerText=noticeText;
   alert("Saved successfully");
 })
 .catch(()=>alert("Save failed"));
}

function toggleLang(){
 currentLang=currentLang==="EN"?"BM":"EN";
 document.getElementById("homeTitle").innerText=lang[currentLang].homeTitle;
 document.getElementById("footerMotivation").innerHTML=
   lang[currentLang].footer.replace(/\n/g,"<br>");
}

toggleLang();

</script>
</body>
</html>
