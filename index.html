<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Official Examination Portal</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Segoe UI',sans-serif;
background:#0f172a;
color:#e2e8f0;
min-height:100vh;
display:flex;
flex-direction:column;
}

/* ===== HEADER ===== */
.header-banner{
background:#111827;
border-bottom:3px solid silver;
padding:15px 30px;
display:flex;
align-items:center;
justify-content:space-between;
flex-wrap:wrap;
}

.header-left{
display:flex;
align-items:center;
gap:15px;
}

.header-left img{
height:60px;
}

.portal-title{
text-align:center;
flex:1;
font-weight:600;
letter-spacing:1px;
}

/* NAVIGATION */
nav{
background:#1e293b;
display:flex;
justify-content:center;
gap:30px;
padding:12px;
flex-wrap:wrap;
}

nav div{
cursor:pointer;
opacity:0.8;
transition:0.3s;
}
nav div:hover{opacity:1}
nav .active{
border-bottom:2px solid silver;
}

/* CONTENT */
.section{
display:none;
padding:40px 20px;
max-width:1100px;
margin:auto;
animation:fade 0.4s ease;
}
.active-section{display:block}

/* CARD */
.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

button{
background:silver;
border:none;
padding:8px 15px;
border-radius:6px;
cursor:pointer;
font-weight:600;
margin-top:10px;
}

input, textarea{
width:100%;
margin-top:10px;
padding:8px;
border:none;
border-radius:6px;
background:#0f172a;
color:white;
}

/* ADMIN SLIDE PANEL */
.admin-panel{
position:fixed;
top:0;
right:-400px;
width:350px;
height:100%;
background:#111827;
padding:25px;
transition:0.4s;
z-index:3000;
overflow-y:auto;
}
.admin-panel.active{right:0}

.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
display:none;
z-index:2000;
}
.overlay.active{display:block}

/* MODAL VIEWER */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
z-index:4000;
}
.modal-content{
width:95%;
height:90%;
background:#1e293b;
border-radius:12px;
display:flex;
flex-direction:column;
}
.modal-header{
padding:10px;
background:#0f172a;
display:flex;
justify-content:space-between;
align-items:center;
}
.modal iframe{
flex:1;
border:none;
border-radius:0 0 12px 12px;
}

/* FOOTER */
footer{
background:#111827;
text-align:center;
padding:25px;
margin-top:auto;
border-top:1px solid #334155;
}

/* MOBILE */
@media(max-width:768px){
.portal-title{font-size:14px}
nav{gap:15px}
.admin-panel{width:100%}
}

@keyframes fade{
from{opacity:0;transform:translateY(8px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<!-- OFFICIAL HEADER -->
<div class="header-banner">
<div class="header-left">
<img src="https://spabangi.github.io/logo/logo.png">
</div>
<div class="portal-title" id="portalTitle">
OFFICIAL EXAMINATION PORTAL
</div>
<div>
<span style="cursor:pointer" onclick="toggleLang()">EN | BM</span>
</div>
</div>

<nav>
<div onclick="showSection('home')" class="active" id="navHome">Home</div>
<div onclick="showSection('student')" id="navStudent">Student Portal</div>
<div onclick="showSection('schedule')" id="navSchedule">Schedule</div>
<div onclick="showSection('guideline')" id="navGuide">Guideline</div>
<div onclick="adminLogin()">Admin</div>
</nav>

<!-- HOME -->
<div id="home" class="section active-section">
<h2 id="homeTitle">Welcome</h2>
<br>
<div class="card">
<h3 id="noticeLabel">Notice Board</h3>
<p id="noticeBoard">Loading...</p>
</div>
</div>

<!-- STUDENT -->
<div id="student" class="section">
<h2 id="studentTitle">Student Portal</h2>
<input id="studentInput">
<button onclick="searchStudent()" id="searchBtn">Search</button>
<br><br>
<div id="studentResults"></div>
</div>

<!-- SCHEDULE -->
<div id="schedule" class="section">
<h2 id="scheduleTitle">Examination Schedule</h2>
<img id="scheduleImage" style="width:100%;border-radius:12px;margin-top:20px;">
</div>

<!-- GUIDELINE -->
<div id="guideline" class="section">
<div class="card">
<h3 id="dipTitle">Diploma Guideline</h3>
<button onclick="openPDF(diplomaPDF)" id="viewBtn1">View</button>
</div>
<div class="card">
<h3 id="degTitle">Degree Guideline</h3>
<button onclick="openPDF(degreePDF)" id="viewBtn2">View</button>
</div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="adminPanel">
<h3>Admin Settings</h3>
<textarea id="noticeInput"></textarea>
<input id="scheduleInput" placeholder="Schedule Link">
<input id="diplomaInput" placeholder="Diploma Link">
<input id="degreeInput" placeholder="Degree Link">
<button onclick="saveAll()">Save</button>
</div>

<div class="overlay" id="overlay" onclick="closeAdmin()"></div>

<!-- PDF MODAL -->
<div class="modal" id="pdfModal">
<div class="modal-content">
<div class="modal-header">
<span>Document Viewer</span>
<button onclick="closeModal()">Close</button>
</div>
<iframe id="pdfFrame"></iframe>
</div>
</div>

<footer>
<p id="footerText"></p>
<br>
<p>SEKSYEN PERKHIDMATAN AKADEMIK KPTM BANGI</p>
</footer>

<script>
const studentCSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vRTy6Guhhcg2p5IL_ZBTADjALjcvlIcJs_gIKhxmEhUqd7HZ2aoUfr0Y6KsKn_owG3R34MNWXp9qZo7/pub?gid=0&single=true&output=csv";
const settingsCSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vRTy6Guhhcg2p5IL_ZBTADjALjcvlIcJs_gIKhxmEhUqd7HZ2aoUfr0Y6KsKn_owG3R34MNWXp9qZo7/pub?gid=1632474227&single=true&output=csv";
const apiURL="https://script.google.com/macros/s/AKfycbw5jD6bf8rNfM8g5fGtQA82GwGj-7xpToXvD6hb_MCrHX5CCwaSwIyyc0Klh6Ge_UH0gA/exec";

let diplomaPDF="", degreePDF="", scheduleImage="", noticeText="";
let studentData=[];
let currentLang="EN";

/* BILINGUAL SYSTEM */
function toggleLang(){
currentLang=currentLang==="EN"?"BM":"EN";

if(currentLang==="BM"){
portalTitle.innerText="PORTAL RASMI PEPERIKSAAN";
homeTitle.innerText="Selamat Datang";
noticeLabel.innerText="Papan Kenyataan";
studentTitle.innerText="Portal Pelajar";
scheduleTitle.innerText="Jadual Peperiksaan";
dipTitle.innerText="Garis Panduan Diploma";
degTitle.innerText="Garis Panduan Ijazah";
searchBtn.innerText="Cari";
footerText.innerHTML="SELAMAT MAJU JAYA!<br>Semoga segala usaha anda selama ini membuahkan kejayaan.<br>Teruskan berusaha dan jangan putus asa!";
}else{
portalTitle.innerText="OFFICIAL EXAMINATION PORTAL";
homeTitle.innerText="Welcome";
noticeLabel.innerText="Notice Board";
studentTitle.innerText="Student Portal";
scheduleTitle.innerText="Examination Schedule";
dipTitle.innerText="Diploma Guideline";
degTitle.innerText="Degree Guideline";
searchBtn.innerText="Search";
footerText.innerHTML="GOOD LUCK!<br>May all your efforts bring success.<br>Keep striving and never give up!";
}
}
toggleLang();

/* NAV */
function showSection(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active-section'));
document.getElementById(id).classList.add('active-section');
}

/* ADMIN */
function adminLogin(){
let pass=prompt("Enter Admin Password:");
if(pass==="8527sy@h"){
adminPanel.classList.add("active");
overlay.classList.add("active");
}
}
function closeAdmin(){
adminPanel.classList.remove("active");
overlay.classList.remove("active");
}

/* PDF */
function openPDF(link){
pdfFrame.src=link;
pdfModal.style.display="flex";
}
function closeModal(){
pdfModal.style.display="none";
}
</script>

</body>
</html>
